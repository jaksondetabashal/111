            padding: 20px;

            text-align: center;

        }

            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;

            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;

            padding: 10px 20px;

            background-color: #2980b9;
        }
        #result-container {
            display: none; /* Скрыто по умолчанию */
            margin-top: 20px;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #2ecc71;
            font-size: 14px;
            padding: 5px 15px;
        }
        .copy-btn:hover {
            background-color: #27ae60;
        }
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 14px;

</head>
